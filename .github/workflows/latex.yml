name: Build LaTeX Documents

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            biber latexmk texlive-plain-generic texlive-latex-base \
            texlive-luatex lmodern fonts-lmodern texlive-latex-recommended \
            texlive-fonts-recommended texlive-latex-extra texlive-fonts-extra \
            texlive-bibtex-extra texlive-science texlive-lang-english \
            texlive-lang-portuguese

      - name: Compile thesis
        run: latexmk -pdf thesis.tex

      - name: Compile presentation
        run: latexmk -pdf presentation.tex

      - name: Upload thesis PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: thesis.pdf
          retention-days: 30

      - name: Upload presentation PDF
        uses: actions/upload-artifact@v4
        with:
          name: presentation-pdf
          path: presentation.pdf
          retention-days: 30
