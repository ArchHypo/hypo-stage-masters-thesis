name: Build LaTeX Documents

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        document:
          - thesis
          - presentation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            biber latexmk texlive-plain-generic texlive-latex-base \
            texlive-luatex lmodern fonts-lmodern texlive-latex-recommended \
            texlive-fonts-recommended texlive-latex-extra texlive-fonts-extra \
            texlive-bibtex-extra texlive-science texlive-lang-english \
            texlive-lang-portuguese

      - name: Compile LaTeX document
        run: latexmk -pdf "${{ matrix.document }}.tex"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.document }}-pdf
          path: ${{ matrix.document }}.pdf
          retention-days: 30
